name: DEV to UAT ADF Deployment

on:
  workflow_dispatch:

jobs:
  deploy-uat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout adf_publish branch
        uses: actions/checkout@v4
        with:
          ref: adf_publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ARM Template to UAT
        uses: Azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: uat-ci-cd-demo-rg
          template: ./rr703dev-ci-cd-adf/ARMTemplateForFactory.json
          parameters: >
            factoryName=rr703uat-ci-cd-adf
